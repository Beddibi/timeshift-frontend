<div class="header-section">
  <div class="title-group">
    <h1 class="page-title">Départements</h1>
    <p class="page-subtitle">Organisez votre structure hiérarchique</p>
  </div>
</div>

<mat-card class="table-card">
  <div class="card-header">
    <mat-form-field appearance="outline" class="add-field">
      <mat-label>Nouveau département</mat-label>
      <input matInput [(ngModel)]="newDeptName" placeholder="Ex: Ressources Humaines" (keyup.enter)="addDepartment()">
    </mat-form-field>
    <button mat-flat-button color="primary" class="add-button" (click)="addDepartment()" [disabled]="!newDeptName.trim()">
      <lucide-icon [name]="plusIcon"></lucide-icon>
      Ajouter
    </button>
  </div>

  <table mat-table [dataSource]="departments" class="personnel-table">
    <!-- Colonne Nom -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nom du Département</th>
      <td mat-cell *matCellDef="let element">
        <div class="dept-cell">
          <lucide-icon [name]="buildingIcon"></lucide-icon>
          <span class="dept-name">{{ element.name }}</span>
        </div>
      </td>
    </ng-container>

    <!-- Colonne Statut -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Statut</th>
      <td mat-cell *matCellDef="let element">
        <mat-chip-set>
          <mat-chip [class.status-active]="element.isActive" [class.status-inactive]="!element.isActive">
            {{ element.isActive ? 'Actif' : 'Inactif' }}
          </mat-chip>
        </mat-chip-set>
      </td>
    </ng-container>

    <!-- Colonne Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        <div class="action-buttons">
          <button mat-icon-button class="delete-btn" (click)="deleteDepartment(element._id)" title="Supprimer">
            <lucide-icon [name]="deleteIcon"></lucide-icon>
          </button>
        </div>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    
    <tr class="mat-row empty-row" *matNoDataRow>
      <td class="mat-cell" [attr.colspan]="displayedColumns.length">
        {{ loading ? 'Chargement des départements...' : 'Aucun département configuré.' }}
      </td>
    </tr>
  </table>
</mat-card>
