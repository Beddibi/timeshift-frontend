<div class="login-container">
  <div class="login-wrapper">
    <div class="brand-section">
      <div class="logo">
        <span class="logo-text">Time<span>Shift</span></span>
      </div>
      <p class="tagline">Gérez votre personnel et le temps de travail avec élégance.</p>
    </div>

    <mat-card class="login-card">
      <mat-card-header>
        <mat-card-title>Bienvenue</mat-card-title>
        <mat-card-subtitle>Connectez-vous à votre espace</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
          <mat-form-field appearance="outline" class="form-field full-width">
            <mat-label>Nom d'utilisateur</mat-label>
            <input matInput formControlName="username" placeholder="Saisissez votre nom d'utilisateur" autocomplete="username">
            <lucide-icon [name]="mailIcon" matPrefix class="input-icon"></lucide-icon>
            <mat-error *ngIf="loginForm.get('username')?.hasError('required')">Requis</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="form-field full-width">
            <mat-label>Mot de passe</mat-label>
            <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Saisissez votre mot de passe" autocomplete="current-password">
            <lucide-icon [name]="lockIcon" matPrefix class="input-icon"></lucide-icon>
            <button mat-icon-button matSuffix (click)="togglePasswordVisibility()" type="button" class="eye-btn" tabindex="-1">
              <lucide-icon [name]="hidePassword ? eyeIcon : eyeOffIcon" class="eye-icon"></lucide-icon>
            </button>
            <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Requis</mat-error>
          </mat-form-field>

          <div class="error-message" *ngIf="error">
            {{ error }}
          </div>

          <button mat-flat-button color="primary" type="submit" class="submit-btn full-width" [disabled]="loginForm.invalid || loading">
            <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
            <span *ngIf="!loading">
              <lucide-icon [name]="loginIcon" class="btn-icon"></lucide-icon>
              Se connecter
            </span>
          </button>
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
